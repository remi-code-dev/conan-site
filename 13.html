  <style>
  body {
    background-color:#0A1931;
    color:white;
    font-family:"Yu Gothic",sans-serif;

  .movie-container {
    max-width: 900px;
    margin: 60px auto;
    background: rgba(0,0,0,0.45);
    padding: 40px;
    border-radius: 20px;
    border: 1px solid #FFD500;
    text-align: center;
  }

  .movie-container img {
    width: 300px;
    border: none;
    border-radius: 0;
    margin-bottom: 20px;
  }

  .movie-title {
    font-size: 2rem;
    margin-bottom: 20px;
    color: #FFD500;
  }

    font-size: 1.2rem;
    line-height: 1.8;
    margin-bottom: 30px;
  }

  .back-btn {
    display: inline-block;
    padding: 12px 30px;
    background: #005BBB;
    color: white;
    border-radius: 5px;
    font-weight: bold;
    text-decoration: none;
    transition: .3s;
  }
  .back-btn:hover {
    background: #FFD500;
    color: #0A1931;
    box-shadow: 0 0 15px rgba(255,213,0,.7);
  }
  </style>
</head>

<body>
  <header class="site-header">

  <div class="movie-container">

    <img src="images/13.jpg">
    <div class="movie-title">漆黒の追跡者</div>
    <div class="movie-desc">
      【あらすじ】<br>
      6人が殺害される広域連続殺人事件が発生。すべての現場にアルファベットが刻まれた麻雀牌が残されていたことから、同一犯による事件として捜査が開始する。だが捜査会議後、コナンは童謡「七つの子」の音階をさせながら携帯メールを打っていた刑事がいたと聞く。「黒ずくめの組織のボスに宛ててメールアドレスを打つと、その音階になる…！まさか、組織のメンバーが刑事に紛れている!?」 黒ずくめの組織を追いながらも事件の真相に近づくコナン、しかしその裏で、コナン＝新一の真実が暴かれようとしていた。
    </div>
