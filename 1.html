<!DOCTYPE html>
<html lang="ja">
<head>

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background-color:#0A1931;
      color:white;
      font-family:"Yu Gothic",sans-serif;
    }

    .movie-container {
      max-width: 900px;
      margin: 60px auto;
      background: rgba(0,0,0,0.45);
      padding: 40px;
      border-radius: 20px;
      border: 1px solid #FFD500;
      text-align: center;
    }

    .movie-container img {
      width: 300px;
      border: none;
      border-radius: 0;
      margin-bottom: 20px;
    }

    .movie-title {
      font-size: 2rem;
      margin-bottom: 20px;
      color: #FFD500;
    }

    .movie-desc {
      font-size: 1.2rem;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 30px;
      background: #005BBB;
      color: white;
      border-radius: 5px;
      font-weight: bold;
      text-decoration: none;
      transition: .3s;
    }
    .back-btn:hover {
      background: #FFD500;
      color: #0A1931;
      box-shadow: 0 0 15px rgba(255,213,0,.7);
    }
  </style>
</head>

<body>
  <header class="site-header">
    <a href="conan.html" class="logo">名探偵コナン</a>

  <div class="movie-container">

    <img src="images/1.jpg">
    <div class="movie-title">時計じかけの摩天楼</div>
    <div class="movie-desc">
      【あらすじ】<br>
      新一の誕生日の前日、何者かにプラスチック爆弾用の火薬が大量に盗まれ、コナンたちが殺人事件を解決したばかりの黒川邸が放火された。ニュースに驚くコナンだったが、そこに犯人を名乗る男から予告電話が！ 狙われたのは子供たちが集まる緑地公園。現場に駆けつけたコナンは爆弾から無事に子供たちを守るが、犯人から次なる爆破予告が届き…。犯人は新一に恨みをもつ者なのか？ パニックに陥った大都会、そしてタイムリミットが迫る！
    </div>
