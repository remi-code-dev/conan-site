      【あらすじ】<br>
      東京サミットの会場を予定していたリゾート施設"エッジ・オブ・オーシャン"で大規模な爆発が発生。現場を警備していた警察官が死傷したというニュースの中に、コナンは安室透の姿を見つける。一方、警視庁の捜査会議では現場の遺留品に小五郎の指紋があったことから、小五郎が容疑者として逮捕されてしまう。公安の捏造を疑うコナンは安室に問い詰めるが、安室の態度は冷たいもので…。安室透は敵なのか？ そして事件の真実とは？
